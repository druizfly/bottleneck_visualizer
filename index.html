<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flow Bottleneck Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #FAFAFA;
    font-family: "Inter", system-ui, sans-serif;
    padding: 24px;
    gap: 32px;
  }

  /* ── Config panel ── */
  .config {
    width: 100%;
    max-width: 1000px;
    background: #FFF;
    border: 1px solid #E8E8E8;
    border-radius: 6px;
    padding: 24px;
  }
  .config h2 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 16px;
  }
  .stage-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 16px;
  }
  .stage-list-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 0 4px;
    border-bottom: 1px solid #F0F0F0;
    margin-bottom: 2px;
  }
  .stage-list-header span {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #BBB;
  }
  .stage-list-header .col-handle      { width: 18px; flex-shrink: 0; }
  .stage-list-header .col-label       { flex: 1; }
  .stage-list-header .col-speed       { min-width: 90px; text-align: center; }
  .stage-list-header .col-weight      { width: 70px; text-align: center; flex-shrink: 0; }
  .stage-list-header .col-concurrency { width: 70px; text-align: center; flex-shrink: 0; }
  .stage-list-header .col-remove      { width: 24px; flex-shrink: 0; }
  .stage-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stage-row .handle {
    cursor: grab;
    color: #CCC;
    font-size: 14px;
    width: 18px;
    text-align: center;
    user-select: none;
  }
  .stage-row .handle:active { cursor: grabbing; }
  .stage-row input[type="text"] {
    flex: 1;
    min-width: 80px;
    padding: 7px 10px;
    font-size: 13px;
    font-family: "Inter", system-ui, sans-serif;
    border: 1px solid #E0E0E0;
    border-radius: 4px;
    outline: none;
    color: #1A1A1A;
    transition: border-color 0.15s;
  }
  .stage-row input[type="text"]:focus {
    border-color: #999;
  }
  .stage-row .weight-ctrl {
    display: flex;
    align-items: center;
    gap: 3px;
    flex-shrink: 0;
  }
  .stage-row .weight-ctrl button {
    width: 22px;
    height: 22px;
    border: 1px solid #E0E0E0;
    border-radius: 3px;
    background: #FFF;
    color: #666;
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    font-family: "Inter", system-ui, sans-serif;
    transition: all 0.15s;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .stage-row .weight-ctrl button:hover { border-color: #999; color: #1A1A1A; }
  .stage-row .weight-ctrl .weight-val {
    font-size: 11px;
    font-weight: 600;
    color: #666;
    min-width: 18px;
    text-align: center;
  }
  .stage-row .speed-toggle {
    font-size: 11px;
    font-weight: 600;
    padding: 5px 10px;
    border-radius: 4px;
    border: 1px solid #E0E0E0;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    min-width: 90px;
    text-align: center;
    font-family: "Inter", system-ui, sans-serif;
  }
  .speed-toggle.fast {
    background: #C41E3A;
    color: #FFF;
    border-color: #C41E3A;
  }
  .speed-toggle.normal {
    background: #FFF;
    color: #999;
    border-color: #E0E0E0;
  }
  .speed-toggle.slow {
    background: #1A6BBF;
    color: #FFF;
    border-color: #1A6BBF;
  }
  .stage-row .remove-btn {
    background: none;
    border: none;
    color: #CCC;
    font-size: 16px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
    transition: color 0.15s;
  }
  .stage-row .remove-btn:hover { color: #C41E3A; }
  .actions {
    display: flex;
    gap: 8px;
  }
  .actions button {
    font-family: "Inter", system-ui, sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 7px 16px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .add-btn {
    background: #FFF;
    border: 1px solid #E0E0E0;
    color: #666;
  }
  .add-btn:hover { border-color: #999; color: #1A1A1A; }
  .apply-btn {
    background: #1A1A1A;
    border: 1px solid #1A1A1A;
    color: #FFF;
  }
  .apply-btn:hover { background: #333; }
  .share-btn {
    background: #FFF;
    border: 1px solid #E0E0E0;
    color: #666;
    margin-left: auto;
  }
  .share-btn:hover { border-color: #999; color: #1A1A1A; }
  .share-btn.copied {
    border-color: #2D9E5F;
    color: #2D9E5F;
  }
  .hint {
    font-size: 11px;
    color: #BBB;
    margin-top: 12px;
    line-height: 1.5;
  }

  /* ── Canvas ── */
  .viz-container {
    width: 100%;
    max-width: 1000px;
  }
  canvas {
    width: 100%;
    height: 220px;
    display: block;
    border-radius: 2px;
    background-color: #FFFFFF;
    border: 1px solid #E8E8E8;
    cursor: crosshair;
  }
</style>
</head>
<body>

<div class="config">
  <h2>Configure stages</h2>
  <div class="stage-list-header">
    <span class="col-handle"></span>
    <span class="col-label">Stage</span>
    <span class="col-speed">Speed</span>
    <span class="col-weight">Length</span>
    <span class="col-concurrency">Parallel</span>
    <span class="col-remove"></span>
  </div>
  <div class="stage-list" id="stageList"></div>
  <div class="actions">
    <button class="add-btn" id="addBtn">+ Add stage</button>
    <button class="apply-btn" id="applyBtn">Apply</button>
    <button class="share-btn" id="shareBtn">Share link</button>
  </div>
  <div class="hint">Click the speed badge to cycle: <b>Normal</b> (gray) → <b>Accelerated</b> (red, fast) → <b>Slow</b> (blue). Use <b>Length − / +</b> to set relative stage width. Use <b>Parallel − / +</b> to cap concurrent items (∞ = no limit) — extras queue at the entrance, shown faded.</div>
</div>

<div class="viz-container">
  <canvas id="viz"></canvas>
</div>

<script>
(() => {
  /* ════════════════════════════════════════
     CONFIGURATION UI
     ════════════════════════════════════════ */
  const defaultStages = [
    { label: 'PLAN',   speed: 'normal', weight: 1, concurrency: 0 },
    { label: 'CODE',   speed: 'fast',   weight: 3, concurrency: 0 },
    { label: 'REVIEW', speed: 'slow',   weight: 2, concurrency: 0 },
    { label: 'TEST',   speed: 'normal', weight: 2, concurrency: 0 },
    { label: 'DEPLOY', speed: 'normal', weight: 1, concurrency: 0 },
  ];

  // ── URL hash serialisation ──
  const SPEED_CHAR = { normal: 'n', fast: 'f', slow: 's' };
  const CHAR_SPEED = { n: 'normal', f: 'fast', s: 'slow' };

  function encodeStages(s) {
    return s.map(st => `${encodeURIComponent(st.label)},${SPEED_CHAR[st.speed] || 'n'},${st.weight || 1},${st.concurrency || 0}`).join('|');
  }

  function decodeStages(hash) {
    try {
      return decodeURIComponent(hash.replace(/^#/, '')).split('|').map(part => {
        const [label, spd, w, c] = part.split(',');
        return { label: label.toUpperCase(), speed: CHAR_SPEED[spd] || 'normal', weight: Math.min(9, Math.max(1, parseInt(w) || 1)), concurrency: Math.min(20, Math.max(0, parseInt(c) || 0)) };
      }).filter(s => s.label);
    } catch { return null; }
  }

  function pushHash(s) {
    history.replaceState(null, '', '#' + encodeStages(s));
  }

  const fromHash = location.hash ? decodeStages(location.hash) : null;
  let stages = JSON.parse(JSON.stringify(fromHash && fromHash.length >= 2 ? fromHash : defaultStages));

  const listEl   = document.getElementById('stageList');
  const addBtn   = document.getElementById('addBtn');
  const applyBtn = document.getElementById('applyBtn');
  const shareBtn = document.getElementById('shareBtn');

  function renderList() {
    listEl.innerHTML = '';
    stages.forEach((s, i) => {
      const row = document.createElement('div');
      row.className = 'stage-row';
      row.draggable = true;
      row.dataset.index = i;

      // Drag handle
      const handle = document.createElement('span');
      handle.className = 'handle';
      handle.textContent = '⠿';

      // Label input
      const input = document.createElement('input');
      input.type = 'text';
      input.value = s.label;
      input.addEventListener('input', () => { stages[i].label = input.value.toUpperCase(); });

      // Speed toggle
      const SPEED_CYCLE = ['normal', 'fast', 'slow'];
      const SPEED_LABEL = { normal: 'Normal', fast: 'Accelerated', slow: 'Slow' };
      const toggle = document.createElement('button');
      toggle.className = 'speed-toggle ' + s.speed;
      toggle.textContent = SPEED_LABEL[s.speed];
      toggle.addEventListener('click', () => {
        const next = SPEED_CYCLE[(SPEED_CYCLE.indexOf(stages[i].speed) + 1) % SPEED_CYCLE.length];
        stages[i].speed = next;
        toggle.className = 'speed-toggle ' + next;
        toggle.textContent = SPEED_LABEL[next];
      });

      // Weight stepper
      const weightCtrl = document.createElement('div');
      weightCtrl.className = 'weight-ctrl';
      const weightDec = document.createElement('button');
      weightDec.textContent = '−';
      const weightVal = document.createElement('span');
      weightVal.className = 'weight-val';
      weightVal.textContent = s.weight;
      const weightInc = document.createElement('button');
      weightInc.textContent = '+';
      weightDec.addEventListener('click', () => {
        if (stages[i].weight > 1) {
          stages[i].weight--;
          weightVal.textContent = stages[i].weight;
        }
      });
      weightInc.addEventListener('click', () => {
        if (stages[i].weight < 9) {
          stages[i].weight++;
          weightVal.textContent = stages[i].weight;
        }
      });
      weightCtrl.append(weightDec, weightVal, weightInc);

      // Concurrency stepper
      const concCtrl = document.createElement('div');
      concCtrl.className = 'weight-ctrl';
      const concDec = document.createElement('button');
      concDec.textContent = '−';
      const concVal = document.createElement('span');
      concVal.className = 'weight-val';
      concVal.textContent = s.concurrency === 0 ? '∞' : s.concurrency;
      const concInc = document.createElement('button');
      concInc.textContent = '+';
      concDec.addEventListener('click', () => {
        if (stages[i].concurrency > 0) {
          stages[i].concurrency--;
          concVal.textContent = stages[i].concurrency === 0 ? '∞' : stages[i].concurrency;
        }
      });
      concInc.addEventListener('click', () => {
        if (stages[i].concurrency < 20) {
          stages[i].concurrency++;
          concVal.textContent = stages[i].concurrency;
        }
      });
      concCtrl.append(concDec, concVal, concInc);

      // Remove button
      const remove = document.createElement('button');
      remove.className = 'remove-btn';
      remove.textContent = '×';
      remove.addEventListener('click', () => {
        if (stages.length > 2) {
          stages.splice(i, 1);
          renderList();
        }
      });

      row.append(handle, input, toggle, weightCtrl, concCtrl, remove);
      listEl.appendChild(row);

      // ── Drag & drop reorder ──
      row.addEventListener('dragstart', e => {
        e.dataTransfer.setData('text/plain', i);
        row.style.opacity = '0.4';
      });
      row.addEventListener('dragend', () => { row.style.opacity = '1'; });
      row.addEventListener('dragover', e => { e.preventDefault(); row.style.borderTop = '2px solid #C41E3A'; });
      row.addEventListener('dragleave', () => { row.style.borderTop = 'none'; });
      row.addEventListener('drop', e => {
        e.preventDefault();
        row.style.borderTop = 'none';
        const from = parseInt(e.dataTransfer.getData('text/plain'));
        const to = i;
        if (from !== to) {
          const [moved] = stages.splice(from, 1);
          stages.splice(to, 0, moved);
          renderList();
        }
      });
    });
  }
  renderList();

  addBtn.addEventListener('click', () => {
    stages.push({ label: 'NEW', speed: 'normal', weight: 1, concurrency: 0 });
    renderList();
    listEl.lastChild.querySelector('input').select();
  });

  applyBtn.addEventListener('click', () => {
    const active = stages.filter(s => s.label.trim());
    pushHash(active);
    initViz(active);
  });

  let shareTimeout;
  shareBtn.addEventListener('click', () => {
    const active = stages.filter(s => s.label.trim());
    pushHash(active);
    navigator.clipboard.writeText(location.href).then(() => {
      shareBtn.textContent = 'Copied!';
      shareBtn.classList.add('copied');
      clearTimeout(shareTimeout);
      shareTimeout = setTimeout(() => {
        shareBtn.textContent = 'Share link';
        shareBtn.classList.remove('copied');
      }, 2000);
    });
  });

  /* ════════════════════════════════════════
     PARTICLE VISUALIZATION ENGINE
     ════════════════════════════════════════ */
  const canvas = document.getElementById('viz');
  const ctx    = canvas.getContext('2d');
  const dpr    = window.devicePixelRatio || 1;

  const ACCENT           = '#C41E3A';
  const ACCENT_SLOW      = '#1A6BBF';
  const DOT_COLOR        = '#B0B0B0';
  const SLOW_SPEED       = 0.15;
  const NORMAL_SPEED     = 0.7;
  const FAST_SPEED       = 5;
  const SPAWN_INITIAL    = 0;
  const SPAWN_INTERVAL   = 200;
  const SPAWN_PER_TICK   = 2;

  const CANVAS_H         = 220;
  const MOUSE_RADIUS     = 80;
  const MOUSE_FORCE      = 1.2;
  const DAMPING          = 0.92;
  const SPRING           = 0.02;
  let TOP_PAD            = 28;

  let currentStages = [];   // [{ label, speed, weight }]
  let colOffsets    = [];   // pre-computed [{ left, width }] per stage
  let particles     = [];
  let nextId        = 0;
  let animId        = null;
  let lastSpawn     = 0;
  let W             = 0;
  const mouse       = { x: -1e3, y: -1e3, active: false };
  const spreadY     = 60;

  function centerY() { return TOP_PAD + (CANVAS_H - TOP_PAD) / 2; }

  function resize() {
    const rect = canvas.getBoundingClientRect();
    canvas.width  = rect.width  * dpr;
    canvas.height = CANVAS_H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    return rect.width;
  }

  function buildOffsets() {
    const totalWeight = currentStages.reduce((sum, s) => sum + (s.weight || 1), 0);
    let left = 0;
    colOffsets = currentStages.map(s => {
      const width = (s.weight || 1) / totalWeight * W;
      const entry = { left, width };
      left += width;
      return entry;
    });
  }

  function stageIndexAt(x) {
    for (let i = colOffsets.length - 1; i >= 0; i--)
      if (x >= colOffsets[i].left) return i;
    return 0;
  }

  function stageAt(x) {
    return currentStages[stageIndexAt(x)] || { speed: 'normal', weight: 1 };
  }

  function speedAt(x) {
    const s = stageAt(x).speed;
    if (s === 'fast') return FAST_SPEED;
    if (s === 'slow') return SLOW_SPEED;
    return NORMAL_SPEED;
  }

  function spawn(x, y) {
    nextId++;
    const baseY = y != null ? y : centerY() + (Math.random() - 0.5) * spreadY * 2;
    return { id: nextId, x, y: baseY, baseY, vy: 0, r: 3.5 + Math.random() * 2 };
  }

  // ── Mouse / touch ──
  canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    mouse.x = e.clientX - r.left; mouse.y = e.clientY - r.top; mouse.active = true;
  });
  canvas.addEventListener('mouseleave', () => { mouse.active = false; });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const r = canvas.getBoundingClientRect();
    mouse.x = e.touches[0].clientX - r.left; mouse.y = e.touches[0].clientY - r.top; mouse.active = true;
  }, { passive: false });
  canvas.addEventListener('touchend', () => { mouse.active = false; });

  // ── Main loop ──
  function frame(ts) {
    const newW = canvas.getBoundingClientRect().width;
    if (Math.abs(newW - W) > 2) { W = resize(); buildOffsets(); }

    // Spawn from left edge (within first column width)
    if (ts - lastSpawn > SPAWN_INTERVAL) {
      lastSpawn = ts;
      const firstColW = colOffsets.length ? colOffsets[0].width : W;
      for (let i = 0; i < SPAWN_PER_TICK; i++)
        particles.push(spawn(Math.random() * firstColW * 0.1));
    }


    // ── Label helpers ──
    // Split a label into display lines: words split across two rows, each capped at 10 chars
    function labelLines(raw) {
      const MAXCH = 10;
      const words = raw.split(' ');
      if (words.length === 1) {
        const w = words[0];
        return [w.length > MAXCH ? w.slice(0, MAXCH - 1) + '…' : w];
      }
      // Two-line split: first word(s) on line 1, rest on line 2
      const mid = Math.ceil(words.length / 2);
      let l1 = words.slice(0, mid).join(' ');
      let l2 = words.slice(mid).join(' ');
      if (l1.length > MAXCH) l1 = l1.slice(0, MAXCH - 1) + '…';
      if (l2.length > MAXCH) l2 = l2.slice(0, MAXCH - 1) + '…';
      return l2 ? [l1, l2] : [l1];
    }

    ctx.font = '600 10px Inter, system-ui, sans-serif';
    const needsRotation = currentStages.some((s, i) => {
      const lines = labelLines(s.label);
      return Math.max(...lines.map(l => ctx.measureText(l).width)) + 8 > colOffsets[i].width;
    });
    TOP_PAD = needsRotation ? 62 : 28;

    // Clear
    ctx.clearRect(0, 0, W, CANVAS_H);
    ctx.fillStyle = 'rgba(0,0,0,0.015)';
    ctx.fillRect(0, TOP_PAD, W, CANVAS_H - TOP_PAD);

    // Labels — horizontal (single or two-line) or diagonal when column is too narrow
    const LINE_H = 12;
    currentStages.forEach((s, i) => {
      ctx.fillStyle = s.speed === 'fast' ? ACCENT : s.speed === 'slow' ? ACCENT_SLOW : '#999';
      const { left, width } = colOffsets[i];
      const cx = Math.min(Math.max(left + width / 2, 6), W - 6);
      const lines = labelLines(s.label);
      const maxTextW = Math.max(...lines.map(l => ctx.measureText(l).width));
      if (maxTextW + 8 > width) {
        // Diagonal: 45°, anchor clamped so text doesn't exit the canvas right edge
        ctx.save();
        ctx.textAlign = 'left';
        const diagX = Math.min(left + 4, W - maxTextW * 0.707 - 4);
        ctx.translate(diagX, TOP_PAD - 4);
        ctx.rotate(-Math.PI / 4);
        lines.forEach((line, li) => ctx.fillText(line, 0, li * LINE_H));
        ctx.restore();
      } else {
        // Horizontal, vertically centred in the top-pad zone
        ctx.textAlign = 'center';
        const totalH = lines.length * LINE_H;
        const startY = (TOP_PAD - totalH) / 2 + LINE_H - 2;
        lines.forEach((line, li) => ctx.fillText(line, cx, startY + li * LINE_H));
      }
    });

    // Column dividers
    for (let i = 1; i < colOffsets.length; i++) {
      ctx.strokeStyle = 'rgba(0,0,0,0.06)';
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.moveTo(colOffsets[i].left, TOP_PAD);
      ctx.lineTo(colOffsets[i].left, CANVAS_H);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Pre-compute live load per stage (mutable — updated as particles are admitted this frame)
    // Only count particles that are actively inside a stage (not waiting at boundary)
    const stageLoad = currentStages.map((s, idx) => {
      const { left, width } = colOffsets[idx];
      return particles.filter(p => p.x >= left && p.x < left + width && !p.atBoundary).length;
    });

    // Update & draw particles
    const alive = [];
    for (const p of particles) {
      const curIdx  = stageIndexAt(p.x);
      const nextX   = p.x + speedAt(p.x);
      const nextIdx = stageIndexAt(nextX);
      const enteringNewStage = nextIdx !== curIdx;
      const targetStage = currentStages[nextIdx];

      // Is the next stage at capacity?
      const nextFull = enteringNewStage
        && targetStage
        && targetStage.concurrency > 0
        && stageLoad[nextIdx] >= targetStage.concurrency;

      if (nextFull) {
        // Advance to the right boundary of the current stage and wait there.
        // This frees the current stage's slot so upstream work can continue.
        const { left: cLeft, width: cWidth } = colOffsets[curIdx];
        const boundary = cLeft + cWidth - 1;
        if (p.x < boundary) {
          p.x = Math.min(nextX, boundary);
          // If we just reached the boundary, release the current stage slot
          if (p.x >= boundary && !p.atBoundary) {
            p.atBoundary = true;
            if (stageLoad[curIdx] > 0) stageLoad[curIdx]--;
          }
        }
        p.queued = true;
      } else {
        p.x = nextX;
        if (enteringNewStage) {
          // If coming from boundary waiting, slot was already released
          if (!p.atBoundary && stageLoad[curIdx] > 0) stageLoad[curIdx]--;
          stageLoad[nextIdx]++;
        }
        p.atBoundary = false;
        if (p.queued) p.queued = false;
      }
      if (p.x > W + 10) continue;
      alive.push(p);

      if (mouse.active) {
        const dx = p.x - mouse.x, dy = p.y - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < MOUSE_RADIUS && dist > 0)
          p.vy += (dy / dist) * (1 - dist / MOUSE_RADIUS) * MOUSE_FORCE;
      }

      p.vy += (p.baseY - p.y) * SPRING;
      p.vy *= DAMPING;
      p.y  += p.vy;
      if (p.y < TOP_PAD + p.r) { p.y = TOP_PAD + p.r; p.vy = 0; }
      if (p.y > CANVAS_H - p.r) { p.y = CANVAS_H - p.r; p.vy = 0; }

      const spd = stageAt(p.x).speed;
      const drawR = p.queued ? p.r * 0.75 : p.r;
      ctx.beginPath();
      ctx.arc(p.x, p.y, drawR, 0, Math.PI * 2);
      ctx.fillStyle   = spd === 'fast' ? ACCENT : spd === 'slow' ? ACCENT_SLOW : DOT_COLOR;
      ctx.globalAlpha = p.queued ? 0.25 : (spd === 'normal' ? 0.5 : 0.9);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    particles = alive;
    animId = requestAnimationFrame(frame);
  }

  // ── Init / reinit ──
  function initViz(stageConfig) {
    if (animId) cancelAnimationFrame(animId);
    currentStages = stageConfig.map(s => ({ label: s.label.trim().toUpperCase(), speed: s.speed || 'normal', weight: s.weight || 1, concurrency: s.concurrency || 0 }));
    particles = [];
    nextId = 0;
    lastSpawn = 0;
    W = resize();
    buildOffsets();
    animId = requestAnimationFrame(frame);
  }

  window.addEventListener('resize', () => { W = resize(); buildOffsets(); });

  // Boot — apply hash config or defaults, then reflect in URL
  const bootStages = fromHash && fromHash.length >= 2 ? fromHash : defaultStages;
  pushHash(bootStages);
  initViz(bootStages);
})();
</script>
</body>
</html>
